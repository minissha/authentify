<!DOCTYPE html>
<html>
<head>
    <title>Authentify Upload</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top left, #1f1c3a, #0f0c29);
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 350px;
        }

        .logo {
            text-align: center;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .card {
            width: 100%;
            padding: 25px;
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
        }

        h3 {
            margin-bottom: 15px;
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.08);
            color: white;
        }

        select option {
            color: black;
        }

        button {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(to right, #6a5af9, #8b5cf6);
            color: white;
            cursor: pointer;
            margin-top: 5px;
        }

        .add-btn {
            background: rgba(255,255,255,0.1);
        }

        .add-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* CUSTOM FILE BUTTON */
        .file-upload {
            display: block;
            padding: 10px;
            border-radius: 8px;
            background: linear-gradient(to right, #6a5af9, #8b5cf6);
            text-align: center;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .file-upload input {
            display: none;
        }

        .file-name {
            font-size: 12px;
            color: #bbb;
            text-align: center;
            margin-bottom: 10px;
        }

        /* DASHBOARD */
        .dashboard {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tile {
            padding: 12px;
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="logo">
    <div class="logo">Authentify</div>

    <div class="card">
        <h3>Upload Documents</h3>
        <h4 id="userCodeDisplay"></h4>

        <form id="uploadForm">
            <div id="fieldsContainer"></div>

            <button type="button" class="add-btn" onclick="addField()">+ Add Document</button>
            <button type="submit">Upload All</button>
        </form>
    </div>

    <div class="card">
        <h3>Your Documents</h3>
        <div class="dashboard" id="dashboard"></div>
    </div>

</div>

<script>

// USER CODE
fetch("backend/getuser.php")
.then(res => res.text())
.then(data => {
    document.getElementById("userCodeDisplay").innerText =
        "Your Verification Code: " + data;
});

// ADD FIELD
function addField(){
    let div = document.createElement("div");

    div.innerHTML = `
        <div style="position:relative; margin-bottom:15px; padding:10px; border-radius:10px; background:rgba(255,255,255,0.05);">

            <span onclick="this.parentElement.parentElement.remove()" 
            style="position:absolute; right:10px; top:5px; cursor:pointer;">✖</span>

            <select name="doc_type[]">
                <option value="">Select Document</option>
                <option value="Aadhaar">Aadhaar</option>
                <option value="PAN">PAN</option>
                <option value="Passport">Passport</option>
                <option value="Other">Other</option>
            </select>

            <input type="text" name="custom_doc[]" placeholder="Enter Document Name" style="display:none;">

            <label class="file-upload">
                Choose File
                <input type="file" name="file[]" required onchange="showFileName(this)">
            </label>

            <div class="file-name"></div>

        </div>
    `;

    document.getElementById("fieldsContainer").appendChild(div);

    let select = div.querySelector("select");
    let custom = div.querySelector("input[type='text']");

    select.addEventListener("change", function(){
        if(this.value === "Other"){
            custom.style.display = "block";
        } else {
            custom.style.display = "none";
        }
    });
}

// SHOW FILE NAME
function showFileName(input){
    let nameDiv = input.parentElement.nextElementSibling;
    nameDiv.textContent = input.files[0].name;
}

// DEFAULT FIELD
addField();


// 🚀 FIXED SUBMIT
document.getElementById("uploadForm").onsubmit = function(e){
    e.preventDefault();

    let formData = new FormData(this);

    fetch("backend/upload.php", {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(data => {
        alert(data); // show actual response

        // RESET FORM
        document.getElementById("uploadForm").reset();
        document.getElementById("fieldsContainer").innerHTML = "";
        addField();

        // 🔥 FORCE REFRESH AFTER SMALL DELAY
        setTimeout(() => {
            loadDashboard();
        }, 300);
    });
};


// 🚀 FIXED DASHBOARD
function loadDashboard(){
    fetch("backend/get_docs.php")
    .then(res => res.json())
    .then(data => {

        console.log("Docs:", data); // DEBUG

        let dash = document.getElementById("dashboard");
        dash.innerHTML = "";

        // ✅ HANDLE EMPTY CASE
        if(!data || data.length === 0){
            dash.innerHTML = "<p>No documents uploaded yet</p>";
            return;
        }

        // ✅ LOOP CORRECTLY
        data.forEach(doc => {
            let tile = document.createElement("div");
            tile.className = "tile";

            tile.innerHTML = `
                <b>${doc.doc_type}</b><br>
                <a href="uploads/${doc.filename}" target="_blank" style="color:#8b5cf6;">
                    View File
                </a>
            `;

            dash.appendChild(tile);
        });
    })
    .catch(err => {
        console.error("Dashboard Error:", err);
    });
}

// INITIAL LOAD
loadDashboard();

</script>
</body>
</html>
